{% extends 'base.html' %}

{% block title %}Delete Delivery{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card content-card">
            <div class="card-body p-4">
                <h1 class="h3 fw-bold text-danger mb-3">Delete Delivery</h1>

                <p class="mb-4">
                    Are you sure you want to delete delivery <strong>#{{ delivery.id }}</strong>?
                </p>

                <form method="post" class="d-flex gap-2">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, delete</button>
                    <a href="{% url 'delivery_list' %}" class="btn btn-outline-secondary">Back</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
