{% extends 'base.html' %}

{% block title %}Set New Password{% endblock %}

{% block content %}
<div class="card content-card mx-auto" style="max-width:600px;">
  <div class="card-body">
    <h3 class="mb-3">Set a new password</h3>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="mt-3 d-flex justify-content-end">
        <button class="btn btn-primary">Set password</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
