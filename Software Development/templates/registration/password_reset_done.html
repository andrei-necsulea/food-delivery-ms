{% extends 'base.html' %}

{% block title %}Password Reset Sent{% endblock %}

{% block content %}
<div class="card content-card mx-auto" style="max-width:600px;">
  <div class="card-body">
    <h3>Password reset email sent</h3>
    <p class="text-muted">If an account with that email exists, you'll receive instructions to reset your password shortly.</p>
    <a href="{% url 'login' %}" class="btn btn-outline-primary mt-3">Back to Login</a>
  </div>
</div>
{% endblock %}
