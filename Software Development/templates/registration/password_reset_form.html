{% extends 'base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="card content-card mx-auto" style="max-width:600px;">
  <div class="card-body">
    <h3 class="mb-3">Reset your password</h3>
    <p class="text-muted">Enter your account email and we'll send password reset instructions.</p>

    <form method="post">
      {% csrf_token %}
      {{ form.email.label_tag }}
      {{ form.email }}
      <div class="mt-3 d-flex justify-content-end">
        <button class="btn btn-primary">Send reset email</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
