{% extends 'base.html' %}

{% block title %}Delete Order{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card content-card">
            <div class="card-body p-4">
                <h1 class="h3 fw-bold text-danger mb-3">
                    {% if user.role == 'client' %}Cancel Order{% else %}Delete Order{% endif %}
                </h1>

                <p class="mb-4">
                    Are you sure you want to proceed for order <strong>#{{ order.id }}</strong>?
                </p>

                <form method="post" class="d-flex gap-2">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        {% if user.role == 'client' %}Yes, cancel{% else %}Yes, delete{% endif %}
                    </button>
                    <a href="{% url 'order_list' %}" class="btn btn-outline-secondary">Back</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
